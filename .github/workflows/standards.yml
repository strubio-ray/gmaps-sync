name: standards
# `on:` is quoted to satisfy `yaml[truthy]` (yamllint + ansible-lint): without
# quotes, YAML 1.1 parsers fold `on` into the boolean `On`. GitHub Actions
# resolves the key by name regardless, and actionlint accepts both forms.
"on":
  # `edited` is in the list so commitlint-pr-title re-runs when a contributor
  # fixes a bad PR title; expensive jobs gate themselves out via `!= 'edited'`.
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    # `0 9 * * 1` → weekly trufflehog (secret-scan tree-wide entropy scan).
    # `0 8 * * 1` → weekly copier-sync; one hour earlier so a sync PR is open
    #              before the audit runs against it.
    - cron: '0 9 * * 1'
    - cron: '0 8 * * 1'
  # Manual trigger for ad-hoc copier-sync runs (drain template-bump backlog).
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    # The `# v1` comment tells Renovate which floating tag to track: it bumps
    # the SHA when .github@v1 advances. Without it, the SHA pin is opaque to
    # Renovate and never gets updated.
    if: github.event_name != 'pull_request' || github.event.action != 'edited'
    uses: Rubio-Enterprises/.github/.github/workflows/audit.yml@01fe99f85085e4694b71387b01933bc8cebe0aa2 # v1
  commitlint-pr-title:
    # PR-title conventional-commit check. Uses the canonical
    # amannn/action-semantic-pull-request action: it bundles commitlint and
    # config-conventional internally, so we sidestep the mise npm-backend
    # extends-resolution issue (resolveExtends starts at CWD and can't see
    # mise's per-package install dirs). Types list mirrors
    # @commitlint/config-conventional so the local lefthook commit-msg hook
    # (which uses mise's commitlint) stays in sync with this gate.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Job-scoped: only this job needs to post a check/status on the PR.
    # The reusable audit/e2e/secret-scan workflows declare their own
    # permissions internally — giving pull-requests:write at workflow level
    # would leak it to push and schedule runs that don't need it.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825  # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            build
            ci
          requireScope: false
  gitleaks:
    if: github.event_name == 'pull_request' && github.event.action != 'edited'
    uses: Rubio-Enterprises/.github/.github/workflows/secret-scan.yml@01fe99f85085e4694b71387b01933bc8cebe0aa2 # v1
    with: { mode: gitleaks }
  trufflehog:
    # schedule = weekly automated; workflow_dispatch = manual re-trigger for
    # incident response or for verifying a .trufflehogignore change without
    # waiting for the next cron tick. See docs/opt-outs.md in
    # Rubio-Enterprises/.github for the path-suppression flow that makes the
    # manual-trigger affordance load-bearing.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: Rubio-Enterprises/.github/.github/workflows/secret-scan.yml@01fe99f85085e4694b71387b01933bc8cebe0aa2 # v1
    with: { mode: trufflehog }

  e2e:
    uses: Rubio-Enterprises/.github/.github/workflows/e2e.yml@01fe99f85085e4694b71387b01933bc8cebe0aa2 # v1
    if: github.event_name != 'pull_request' || github.event.action != 'edited'

  lint-hooks:
    # CI gate that runs lefthook commands across the full repo (not just staged
    # diffs). Catches drift in hook-tool pins / PATH wiring that local commits
    # would otherwise hit first. PR-only; push/schedule paths skip.
    if: github.event_name == 'pull_request' && github.event.action != 'edited'
    uses: Rubio-Enterprises/.github/.github/workflows/lint-hooks.yml@01fe99f85085e4694b71387b01933bc8cebe0aa2 # v1
  copier-sync:
    # Weekly + manual: detect drift between this repo's rendered template state
    # and the latest `template/v1` release, then open a PR with the rendered
    # diff. Per Plan 3 Task 13 — replaces the manual `copier update` sweep.
    # Bootstrap repos (.github, .github-private, standards itself) should NOT
    # render this template, so they don't get the job. Skipped here in-repo via
    # the cron+dispatch event guard; consumers receive both triggers.
    if: >-
      github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1'
      || github.event_name == 'workflow_dispatch'
    uses: Rubio-Enterprises/.github/.github/workflows/copier-sync.yml@01fe99f85085e4694b71387b01933bc8cebe0aa2 # v1
    permissions:
      contents: write
      pull-requests: write
