# release-please: opens / updates a release PR on every push to main.
# When the release PR is merged, release-please tags + creates a GitHub release.
# Per-archetype release-types are configured in release-please-config.json.

name: release-please
# `on:` is quoted to satisfy `yaml[truthy]` (yamllint + ansible-lint): without
# quotes, YAML 1.1 parsers fold `on` into the boolean `On`. GitHub Actions
# resolves the key by name regardless, and actionlint accepts both forms.
"on":
  push:
    branches: [main]

permissions:
  contents: write # tag + create release
  pull-requests: write # open / update the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          # Defaults to release-please-config.json + .release-please-manifest.json
          # at the repo root — both are Copier-synced into every consumer repo.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
