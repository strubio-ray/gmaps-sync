# .mise.toml — task runner contract (§6.3: `mise run lint`, `mise run test`, `mise run e2e`, `mise run build`)
# Backend-prefixed pins (`npm:`, `aqua:`, `github:`) live here, not in .tool-versions.

[tools]
# commitlint via mise's npm: backend so the binary lands on PATH across every
# archetype. Earlier the template assumed TS consumers carried commitlint as a
# package.json devDep, but Pattern E preserves the consumer's package.json
# (`_skip_if_exists`), so the assumption broke. mise pinning is the consistent
# audit-side contract — same as how gitleaks/conftest/check-jsonschema work.
"npm:@commitlint/cli" = "20"
"npm:@commitlint/config-conventional" = "20"

# Hook tools backing lefthook.yml. Universal across archetypes — every
# archetype's lefthook runs markdownlint/yamllint/prettier and most run
# shellcheck/shfmt. Pinning here is the only way `lefthook run` can
# resolve these binaries on a fresh CI runner (and via `mise exec --` locally
# without polluting the developer's global tool surface).
"aqua:koalaman/shellcheck" = "0.10"
"aqua:mvdan/sh"            = "3.10"   # shfmt
"npm:markdownlint-cli2"    = "0.22"
"npm:prettier"             = "3.4"
"pipx:yamllint"            = "1.37"
# lefthook binary itself. The lint-hooks CI job runs `mise exec -- lefthook
# run pre-commit --all-files`, which requires lefthook on PATH from mise (the
# CI runner doesn't carry it natively). Locally developers usually have
# lefthook via Homebrew; pinning here keeps CI and the developer-laptop
# parity. The audit-side .standards/.mise.toml does NOT pin lefthook because
# audit.yml doesn't invoke it — only consumer-side lint-hooks does.
"aqua:evilmartians/lefthook" = "2"
# gitleaks here mirrors the audit-side pin in .standards/.mise.toml. The
# lefthook pre-commit gitleaks hook invokes a bare `gitleaks git --staged`,
# which needs the binary on PATH — the consumer-side lint-hooks CI job
# doesn't materialize .standards/ so cannot rely on that pin.
"aqua:gitleaks/gitleaks"     = "8"
# yq — used by the `_tasks` merge-yamllint.sh hook to deep-merge consumer-side
# .yamllint.local into the template-rendered .yamllint at copier render time.
# Pinning universally so consumers can rely on it for their own scripts too.
"aqua:mikefarah/yq"          = "4"
# Biome 2.x — TS archetypes (including ts-web-angular). The lefthook `biome`
# command uses `npx biome` (consumer-owned devDep), but mise pinning here
# documents the org-floor version + lands the binary on PATH for `mise exec`
# invocations. Also pinned for any non-TS archetype when has_embedded_web=true
# so the embedded web surface (JS/JSX/TS/CSS) gets the same Biome floor as a
# standalone ts-* repo (e.g. vibetunnel Swift + Node, todoist-classify Python +
# React/JSX).
#
# Note for ts-web-angular: the template pins Biome and renders `biome.json`
# uniformly with ts-web. The audit-side override-policy Rego rule that "scripts.lint
# invokes biome" is relaxed for Angular repos (policy/typescript/overrides.rego's
# `is_angular_repo` bypass) so consumers running `ng lint` still pass — but the
# template no longer withholds biome.json from Angular consumers who legitimately
# want Biome alongside ESLint (e.g. super-productivity's `scripts.lint: "biome
# check ."`). Consumers who don't want Biome can delete biome.json; `_skip_if_exists`
# keeps it from coming back on `copier update`.
"npm:@biomejs/biome"       = "2"
# TS archetypes: tasks delegate to package.json scripts (the consumer owns
# package.json per Pattern A/D / _skip_if_exists). The audit Layer B JSON
# Schema enforces that lint, test, e2e exist in scripts; this contract makes
# `mise run <task>` the uniform invocation across all archetypes regardless
# of how the underlying TS toolchain is wired.
[tasks.lint]
description = "Delegates to scripts.lint in package.json"
run = ["npm run lint"]

[tasks.test]
description = "Delegates to scripts.test in package.json"
run = ["npm run test"]

[tasks.build]
description = "Delegates to scripts.build in package.json"
run = ["npm run build"]
[tasks.e2e-setup]
description = "Install Playwright browsers"
run = ["npx playwright install --with-deps"]

[tasks.e2e]
description = "Delegates to scripts.e2e in package.json (consumers wrap dev-server setup, base URL, etc. — the template's invocation contract is just 'mise run e2e')"
run = ["npm run e2e"]
